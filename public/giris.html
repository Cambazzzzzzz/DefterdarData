<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Giriş - Defterdar Muhasebe</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="fa/css/all.min.css"/>
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at 20% 0%, rgba(79,126,248,0.08) 0%, transparent 60%), radial-gradient(ellipse at 80% 100%, rgba(167,139,250,0.06) 0%, transparent 60%), var(--bg)">

<div style="width:100%;max-width:420px;padding:20px">
  <div style="text-align:center;margin-bottom:32px">
    <div style="width:64px;height:64px;background:linear-gradient(135deg,#1a2a50,#0d1830);border:1px solid var(--border2);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 0 20px var(--glow)">
      <i class="fa-solid fa-book-open" style="font-size:28px;color:var(--accent)"></i>
    </div>
    <div style="font-size:24px;font-weight:800;margin-bottom:4px">DEFTERDAR</div>
    <div style="font-size:14px;color:var(--text3)">Muhasebe Sistemi</div>
  </div>

  <div class="card" style="padding:32px">
    <div class="tabs" style="margin-bottom:24px">
      <button class="tab-btn active" id="tab-giris" onclick="switchTab('giris')">Giriş Yap</button>
      <button class="tab-btn" id="tab-kayit" onclick="switchTab('kayit')">Kayıt Ol</button>
    </div>

    <!-- GİRİŞ FORMU -->
    <div id="form-giris">
      <div class="form-group">
        <label>Kullanıcı Adı</label>
        <input type="text" id="giris-kullanici" placeholder="Kullanıcı adınız"/>
      </div>
      <div class="form-group">
        <label>Şifre</label>
        <input type="password" id="giris-sifre" placeholder="Şifreniz"/>
      </div>
      <button class="btn btn-primary" style="width:100%;margin-top:16px" onclick="girisYap()">
        <i class="fa-solid fa-right-to-bracket"></i> Giriş Yap
      </button>
    </div>

    <!-- KAYIT FORMU -->
    <div id="form-kayit" style="display:none">
      <div class="form-group">
        <label>Kullanıcı Adı</label>
        <input type="text" id="kayit-kullanici" placeholder="Kullanıcı adınız"/>
      </div>
      <div class="form-group">
        <label>E-posta</label>
        <input type="email" id="kayit-email" placeholder="E-posta adresiniz"/>
      </div>
      <div class="form-group">
        <label>Şifre</label>
        <input type="password" id="kayit-sifre" placeholder="En az 6 karakter"/>
      </div>
      <button class="btn btn-primary" style="width:100%;margin-top:16px" onclick="kayitOl()">
        <i class="fa-solid fa-user-plus"></i> Kayıt Ol
      </button>
    </div>

    <div id="mesaj" style="margin-top:16px;text-align:center;font-size:13px"></div>
  </div>

  <div style="text-align:center;margin-top:24px;font-size:12px;color:var(--text3)">
    CMS Team &copy; 2025 &nbsp;|&nbsp; Founder: Ismail DEMIRCAN
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
function switchTab(tab) {
  document.getElementById('tab-giris').classList.toggle('active', tab === 'giris');
  document.getElementById('tab-kayit').classList.toggle('active', tab === 'kayit');
  document.getElementById('form-giris').style.display = tab === 'giris' ? '' : 'none';
  document.getElementById('form-kayit').style.display = tab === 'kayit' ? '' : 'none';
  document.getElementById('mesaj').innerHTML = '';
}

function toast(msg, type='success') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<i class="fa-solid fa-${type==='success'?'circle-check':'circle-xmark'}"></i> ${msg}`;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3200);
}

async function girisYap() {
  const kullanici_adi = document.getElementById('giris-kullanici').value.trim();
  const sifre = document.getElementById('giris-sifre').value;
  
  if (!kullanici_adi || !sifre) {
    toast('Tüm alanları doldurun', 'error');
    return;
  }

  try {
    const r = await fetch('/api/auth/giris', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ kullanici_adi, sifre })
    });
    const d = await r.json();
    
    if (!r.ok) {
      toast(d.hata || 'Giriş başarısız', 'error');
      return;
    }

    localStorage.setItem('defterdar-last-login', Date.now().toString());
    toast('Giriş başarılı! Yönlendiriliyorsunuz...');
    setTimeout(() => {
      if (d.rol === 'admin') {
        window.location.href = '/admin';
      } else {
        window.location.href = '/';
      }
    }, 800);
  } catch(e) {
    toast('Bağlantı hatası: ' + e.message, 'error');
  }
}

async function kayitOl() {
  const kullanici_adi = document.getElementById('kayit-kullanici').value.trim();
  const email = document.getElementById('kayit-email').value.trim();
  const sifre = document.getElementById('kayit-sifre').value;
  
  if (!kullanici_adi || !email || !sifre) {
    toast('Tüm alanları doldurun', 'error');
    return;
  }

  if (sifre.length < 6) {
    toast('Şifre en az 6 karakter olmalı', 'error');
    return;
  }

  try {
    const r = await fetch('/api/auth/kayit', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ kullanici_adi, email, sifre })
    });
    const d = await r.json();
    
    if (!r.ok) {
      toast(d.hata || 'Kayıt başarısız', 'error');
      return;
    }

    localStorage.setItem('defterdar-last-login', Date.now().toString());
    toast('Kayıt başarılı! Yönlendiriliyorsunuz...');
    setTimeout(() => window.location.href = '/', 800);
  } catch(e) {
    toast('Bağlantı hatası: ' + e.message, 'error');
  }
}

// Enter tuşu ile giriş
document.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    const activeTab = document.getElementById('tab-giris').classList.contains('active') ? 'giris' : 'kayit';
    if (activeTab === 'giris') girisYap();
    else kayitOl();
  }
});
</script>

</body>
</html>
