<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - Defterdar</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .test-container {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .test-item {
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .success { background: #d4edda; border-color: #c3e6cb; color: #155724; }
        .error { background: #f8d7da; border-color: #f5c6cb; color: #721c24; }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>Defterdar Test Sayfası</h1>
        
        <div class="test-item" id="css-test">
            <h3>CSS Yükleme Testi</h3>
            <p>Bu metin CSS ile stillendirilmelidir.</p>
        </div>
        
        <div class="test-item">
            <h3>Logo Testi</h3>
            <img src="defterdar.png" alt="Defterdar Logo" style="max-height: 100px;">
            <p>Logo yukarıda görünmelidir.</p>
        </div>
        
        <div class="test-item">
            <h3>Font Awesome Testi</h3>
            <i class="fa-solid fa-check"></i> Bu ikon görünmelidir
        </div>
        
        <div class="test-item">
            <h3>Karakter Kodlama Testi</h3>
            <p>Türkçe karakterler: ğüşıöçĞÜŞİÖÇ</p>
        </div>
    </div>
    
    <script>
        // CSS yüklenme kontrolü
        window.addEventListener('load', function() {
            const testEl = document.getElementById('css-test');
            const computedStyle = window.getComputedStyle(document.body);
            const bgColor = computedStyle.backgroundColor;
            
            if (bgColor && bgColor !== 'rgba(0, 0, 0, 0)' && bgColor !== 'transparent') {
                testEl.classList.add('success');
                testEl.innerHTML += '<p><strong>✓ CSS başarıyla yüklendi!</strong></p>';
            } else {
                testEl.classList.add('error');
                testEl.innerHTML += '<p><strong>✗ CSS yüklenemedi!</strong></p>';
            }
        });
    </script>
</body>
</html>
