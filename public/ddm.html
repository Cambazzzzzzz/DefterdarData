<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>DDM</title>
  <link rel="stylesheet" href="fa/css/all.min.css"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0d0d0d;color:#e0e0e0;font-family:'Segoe UI',sans-serif;min-height:100vh}

    /* GİRİŞ EKRANI */
    #giris-ekrani{
      display:flex;align-items:center;justify-content:center;
      min-height:100vh;
    }
    #giris-kutu{
      background:#161616;border:1px solid #222;border-radius:12px;
      padding:40px 36px;width:320px;
    }
    #giris-kutu input{
      width:100%;padding:12px 14px;background:#0d0d0d;border:1px solid #333;
      border-radius:8px;color:#e0e0e0;font-size:15px;outline:none;
      letter-spacing:2px;
    }
    #giris-kutu input:focus{border-color:#555}
    #giris-kutu button{
      width:100%;margin-top:14px;padding:12px;background:#222;
      border:1px solid #333;border-radius:8px;color:#e0e0e0;
      font-size:14px;cursor:pointer;transition:.2s;
    }
    #giris-kutu button:hover{background:#2a2a2a;border-color:#555}
    #giris-hata{color:#e74c3c;font-size:13px;margin-top:10px;text-align:center;min-height:18px}

    /* PANEL */
    #panel{display:none}
    .topbar{
      display:flex;align-items:center;justify-content:space-between;
      padding:0 20px;height:52px;background:#111;border-bottom:1px solid #222;
      position:sticky;top:0;z-index:100;
    }
    .topbar-brand{font-size:14px;font-weight:600;letter-spacing:1px;color:#aaa}
    .topbar-right{display:flex;gap:10px;align-items:center}
    .topbar-btn{
      padding:6px 14px;background:#1a1a1a;border:1px solid #333;
      border-radius:6px;color:#aaa;font-size:12px;cursor:pointer;transition:.2s;
    }
    .topbar-btn:hover{background:#222;color:#e0e0e0}
    .topbar-btn.red:hover{border-color:#e74c3c;color:#e74c3c}

    .layout{display:flex;min-height:calc(100vh - 52px)}
    .sidebar{
      width:200px;background:#111;border-right:1px solid #1e1e1e;
      padding:16px 0;flex-shrink:0;
    }
    .sidebar-item{
      padding:10px 20px;font-size:13px;color:#888;cursor:pointer;
      display:flex;align-items:center;gap:10px;transition:.15s;
    }
    .sidebar-item:hover{background:#1a1a1a;color:#ccc}
    .sidebar-item.active{background:#1e1e1e;color:#fff;border-left:2px solid #555}
    .badge-count{
      margin-left:auto;background:#e74c3c;color:#fff;
      border-radius:10px;padding:1px 7px;font-size:11px;
    }
    .main{flex:1;padding:24px;overflow-y:auto}

    /* KARTLAR */
    .stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:24px}
    .stat-card{background:#161616;border:1px solid #222;border-radius:10px;padding:18px 16px}
    .stat-card .val{font-size:28px;font-weight:700;color:#fff}
    .stat-card .lbl{font-size:12px;color:#666;margin-top:4px}

    .section-title{font-size:14px;font-weight:600;color:#aaa;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #1e1e1e}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{text-align:left;padding:8px 10px;color:#666;border-bottom:1px solid #1e1e1e;font-weight:500}
    td{padding:8px 10px;border-bottom:1px solid #161616;color:#ccc}
    tr:hover td{background:#161616}

    .btn{
      padding:5px 12px;border-radius:6px;border:1px solid #333;
      background:#1a1a1a;color:#ccc;font-size:12px;cursor:pointer;transition:.15s;
    }
    .btn:hover{background:#222;color:#fff}
    .btn.green{border-color:#27ae60;color:#27ae60}
    .btn.green:hover{background:#1a2e1a}
    .btn.red{border-color:#e74c3c;color:#e74c3c}
    .btn.red:hover{background:#2e1a1a}
    .btn.blue{border-color:#3498db;color:#3498db}
    .btn.blue:hover{background:#1a222e}
    .btn.yellow{border-color:#f39c12;color:#f39c12}
    .btn.yellow:hover{background:#2e2a1a}

    .tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px}
    .tag.pro{background:#1a2e1a;color:#27ae60;border:1px solid #27ae60}
    .tag.normal{background:#1a1a2e;color:#3498db;border:1px solid #3498db}
    .tag.admin{background:#2e1a2e;color:#9b59b6;border:1px solid #9b59b6}
    .tag.aktif{background:#1a2e1a;color:#27ae60}
    .tag.askida{background:#2e2a1a;color:#f39c12}
    .tag.yasak{background:#2e1a1a;color:#e74c3c}

    .input-row{display:flex;gap:8px;margin-bottom:14px;align-items:center}
    .input-row input,.input-row select{
      padding:8px 12px;background:#0d0d0d;border:1px solid #333;
      border-radius:6px;color:#e0e0e0;font-size:13px;outline:none;
    }
    .input-row input:focus,.input-row select:focus{border-color:#555}

    /* MODAL */
    .modal-bg{
      display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
      z-index:200;align-items:center;justify-content:center;
    }
    .modal-bg.open{display:flex}
    .modal{background:#161616;border:1px solid #2a2a2a;border-radius:12px;padding:28px;width:380px;max-width:95vw}
    .modal h3{font-size:15px;margin-bottom:18px;color:#ccc}
    .modal input{
      width:100%;padding:10px 12px;background:#0d0d0d;border:1px solid #333;
      border-radius:6px;color:#e0e0e0;font-size:13px;outline:none;margin-bottom:10px;
    }
    .modal input:focus{border-color:#555}
    .modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:6px}

    .key-list{font-family:monospace;font-size:12px;background:#0d0d0d;border:1px solid #222;
      border-radius:6px;padding:12px;max-height:200px;overflow-y:auto;color:#27ae60;line-height:1.8}
  </style>
</head>
<body>

<!-- GİRİŞ EKRANI -->
<div id="giris-ekrani">
  <div id="giris-kutu">
    <input type="password" id="sifre-input" placeholder="••••••••••••••••" autocomplete="off"
      onkeydown="if(event.key==='Enter')girisYap()"/>
    <button onclick="girisYap()"><i class="fa-solid fa-arrow-right"></i></button>
    <div id="giris-hata"></div>
  </div>
</div>

<!-- PANEL -->
<div id="panel">
  <div class="topbar">
    <div class="topbar-brand">DDM</div>
    <div class="topbar-right">
      <div class="topbar-btn" onclick="sifreDegistirModal()"><i class="fa-solid fa-key"></i> Şifre</div>
      <div class="topbar-btn red" onclick="cikisYap()"><i class="fa-solid fa-right-from-bracket"></i> Çıkış</div>
    </div>
  </div>
  <div class="layout">
    <nav class="sidebar">
      <div class="sidebar-item active" data-page="dashboard" onclick="showPage('dashboard')">
        <i class="fa-solid fa-chart-line"></i> Dashboard
      </div>
      <div class="sidebar-item" data-page="kullanicilar" onclick="showPage('kullanicilar')">
        <i class="fa-solid fa-users"></i> Kullanıcılar
      </div>
      <div class="sidebar-item" data-page="pro-keyler" onclick="showPage('pro-keyler')">
        <i class="fa-solid fa-key"></i> PRO Keyler
      </div>
      <div class="sidebar-item" data-page="pro-talepler" onclick="showPage('pro-talepler')">
        <i class="fa-solid fa-envelope"></i> PRO Talepleri
        <span class="badge-count" id="talep-badge" style="display:none">0</span>
      </div>
      <div class="sidebar-item" data-page="ip-yasaklar" onclick="showPage('ip-yasaklar')">
        <i class="fa-solid fa-ban"></i> IP Yasakları
      </div>
    </nav>
    <main class="main" id="main-content"></main>
  </div>
</div>

<!-- Şifre Değiştir Modal -->
<div class="modal-bg" id="sifre-modal">
  <div class="modal">
    <h3><i class="fa-solid fa-key"></i> Admin Şifre Değiştir</h3>
    <input type="password" id="yeni-sifre" placeholder="Yeni şifre (min 6 karakter)"/>
    <input type="password" id="yeni-sifre2" placeholder="Tekrar"/>
    <div id="sifre-hata" style="color:#e74c3c;font-size:12px;min-height:16px"></div>
    <div class="modal-btns">
      <button class="btn" onclick="document.getElementById('sifre-modal').classList.remove('open')">İptal</button>
      <button class="btn green" onclick="sifreDegistir()">Kaydet</button>
    </div>
  </div>
</div>

<!-- Kullanıcı Şifre Modal -->
<div class="modal-bg" id="kullanici-sifre-modal">
  <div class="modal">
    <h3>Kullanıcı Şifre Değiştir</h3>
    <input type="hidden" id="ks-uid"/>
    <input type="password" id="ks-sifre" placeholder="Yeni şifre"/>
    <div id="ks-hata" style="color:#e74c3c;font-size:12px;min-height:16px"></div>
    <div class="modal-btns">
      <button class="btn" onclick="document.getElementById('kullanici-sifre-modal').classList.remove('open')">İptal</button>
      <button class="btn green" onclick="kullaniciSifreDegistir()">Kaydet</button>
    </div>
  </div>
</div>

<script src="app-admin.js"></script>
<div id="toast-container" style="position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px"></div>
<div id="modal-overlay" class="hidden" onclick="closeModalOutside(event)" style="position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:flex;align-items:center;justify-content:center">
  <div id="modal-box" class="modal" style="background:#161616;border:1px solid #2a2a2a;border-radius:12px;padding:28px;min-width:340px;max-width:95vw;max-height:90vh;overflow-y:auto">
    <h3 id="modal-title" style="font-size:15px;margin-bottom:18px;color:#ccc;display:flex;align-items:center;gap:8px"></h3>
    <div id="modal-body"></div>
  </div>
</div>
<style>
.hidden{display:none!important}
.modal-lg{min-width:600px!important}
.toast{padding:10px 16px;border-radius:8px;font-size:13px;background:#1e1e1e;border:1px solid #333;color:#ccc;display:flex;align-items:center;gap:8px}
.toast.success{border-color:#27ae60;color:#27ae60}
.toast.error{border-color:#e74c3c;color:#e74c3c}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.page-title{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:600;color:#ccc}
.icon-wrap{width:32px;height:32px;background:#1e1e1e;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#888}
.card{background:#161616;border:1px solid #1e1e1e;border-radius:10px;padding:16px;overflow:hidden}
.table-wrap{overflow-x:auto}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.badge-green{background:#1a2e1a;color:#27ae60;border:1px solid #27ae60}
.badge-gray{background:#1e1e1e;color:#888;border:1px solid #333}
.badge-yellow{background:#2e2a1a;color:#f39c12;border:1px solid #f39c12}
.badge-red{background:#2e1a1a;color:#e74c3c;border:1px solid #e74c3c}
.badge-blue{background:#1a222e;color:#3498db;border:1px solid #3498db}
.badge-purple{background:#2e1a2e;color:#9b59b6;border:1px solid #9b59b6}
.btn-sm{padding:4px 10px!important;font-size:12px!important}
.btn-icon{width:28px;height:28px;padding:0!important;display:inline-flex;align-items:center;justify-content:center}
.btn-primary{background:#1a222e;border-color:#3498db;color:#3498db}
.btn-primary:hover{background:#1e2a38}
.btn-secondary{background:#1a1a1a;border-color:#333;color:#888}
.btn-secondary:hover{background:#222;color:#ccc}
.btn-success{background:#1a2e1a;border-color:#27ae60;color:#27ae60}
.btn-success:hover{background:#1e3a1e}
.btn-danger{background:#2e1a1a;border-color:#e74c3c;color:#e74c3c}
.btn-danger:hover{background:#3a1e1e}
.btn-purple{background:#2e1a2e;border-color:#9b59b6;color:#9b59b6}
.btn-yellow{background:#2e2a1a;border-color:#f39c12;color:#f39c12}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:#161616;border:1px solid #222;border-radius:10px;padding:18px 16px;display:flex;flex-direction:column;gap:6px}
.stat-card.blue{border-color:#1a3a5c}.stat-card.green{border-color:#1a3a1a}.stat-card.yellow{border-color:#3a3a1a}.stat-card.red{border-color:#3a1a1a}.stat-card.purple{border-color:#2e1a3a}
.stat-icon{font-size:18px;color:#555}
.stat-value{font-size:26px;font-weight:700;color:#fff}
.stat-label{font-size:12px;color:#666}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;color:#888;margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;background:#0d0d0d;border:1px solid #333;border-radius:6px;color:#e0e0e0;font-size:13px;outline:none}
.form-group textarea{min-height:80px;resize:vertical}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
</style>
<script>
// ── GİRİŞ ──────────────────────────────────────────────────────────────────
async function girisYap() {
  const sifre = document.getElementById('sifre-input').value;
  const hata = document.getElementById('giris-hata');
  hata.textContent = '';
  try {
    const r = await fetch('/api/ddm/giris', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ sifre })
    });
    const d = await r.json();
    if (d.ok) {
      document.getElementById('giris-ekrani').style.display = 'none';
      document.getElementById('panel').style.display = 'block';
      initPanel();
    } else {
      hata.textContent = '✗';
      document.getElementById('sifre-input').value = '';
    }
  } catch(e) { hata.textContent = 'Hata'; }
}

async function cikisYap() {
  await fetch('/api/ddm/cikis', { method:'POST' });
  document.getElementById('panel').style.display = 'none';
  document.getElementById('giris-ekrani').style.display = 'flex';
  document.getElementById('sifre-input').value = '';
}

async function sifreDegistirModal() {
  document.getElementById('yeni-sifre').value = '';
  document.getElementById('yeni-sifre2').value = '';
  document.getElementById('sifre-hata').textContent = '';
  document.getElementById('sifre-modal').classList.add('open');
}

async function sifreDegistir() {
  const s1 = document.getElementById('yeni-sifre').value;
  const s2 = document.getElementById('yeni-sifre2').value;
  const hata = document.getElementById('sifre-hata');
  if (s1.length < 6) { hata.textContent = 'En az 6 karakter'; return; }
  if (s1 !== s2) { hata.textContent = 'Şifreler eşleşmiyor'; return; }
  const r = await fetch('/api/ddm/sifre-degistir', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ yeni_sifre: s1 })
  });
  const d = await r.json();
  if (d.ok) {
    document.getElementById('sifre-modal').classList.remove('open');
  } else {
    hata.textContent = d.hata || 'Hata';
  }
}

// ── BAŞLANGIÇ ──────────────────────────────────────────────────────────────
(async () => {
  const r = await fetch('/api/ddm/durum');
  const d = await r.json();
  if (d.giris) {
    document.getElementById('giris-ekrani').style.display = 'none';
    document.getElementById('panel').style.display = 'block';
    initPanel();
  }
})();
</script>
</body>
</html>
