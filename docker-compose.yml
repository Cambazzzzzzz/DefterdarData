version: '3.8'

services:
  defterdar:
    build: .
    container_name: defterdar-muhasebe
    restart: unless-stopped
    ports:
      - "4500:4500"
    environment:
      - NODE_ENV=production
      - PORT=4500
      - SESSION_SECRET=defterdar-cms-2024-super-secret-key-change-this
    volumes:
      - defterdar_data:/app/data
      - defterdar_logs:/app/logs
    networks:
      - defterdar_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4500/api/auth/durum"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  defterdar_data:
    driver: local
  defterdar_logs:
    driver: local

networks:
  defterdar_network:
    driver: bridge